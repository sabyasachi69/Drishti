<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRISHTI App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="/">
        <span>DRISHTI</span>
        <strong>.</strong>
      </a>
      <div class="profile-card" id="profileCard">
        <div class="skeleton-line wide"></div>
        <div class="skeleton-line"></div>
      </div>
      <nav class="app-nav" aria-label="DRISHTI app">
        <a href="#dashboard" data-route="dashboard" class="active">Dashboard</a>
        <a href="#courses" data-route="courses">Courses</a>
        <a href="#tasks" data-route="tasks">Tasks</a>
        <a href="#forums" data-route="forums">Peer Forum</a>
        <a href="#groups" data-route="groups">Study Groups</a>
        <a href="#library" data-route="library">Offline Library</a>
        <a href="#analytics" data-route="analytics">Analytics</a>
        <a href="#profile" data-route="profile">Profile</a>
        <a href="#contact" data-route="contact">Contact</a>
      </nav>
      <button class="ghost full" id="refreshButton" type="button">Refresh workspace</button>
      <button class="ghost full" id="logoutButton" type="button" hidden>Sign out</button>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div>
          <p class="eyebrow">Smart Education Workspace</p>
          <h1 id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-actions">
          <a class="button secondary" href="/">Landing Page</a>
          <button class="button" id="quickPlanButton" type="button">Refresh recommendations</button>
        </div>
      </header>

      <section class="status-strip" id="statusStrip" aria-live="polite">
        <div>Loading DRISHTI workspace...</div>
      </section>

      <section id="appView" class="view" aria-live="polite"></section>
    </main>
  </div>

  <script src="/drishti-app.js" defer></script>
</body>
</html>
